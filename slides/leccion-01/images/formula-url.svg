<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f6f8fa"/>
  <rect x="80" y="100" width="1440" height="700" rx="34" fill="#ffffff" stroke="#d6dee6" stroke-width="2"/>
  <rect x="80" y="100" width="1440" height="28" fill="#0e6b9f"/>
  <text x="130" y="185" font-family="Segoe UI, Arial" font-size="44" font-weight="700" fill="#102f45">URL dinámica del sensor</text>
  <text x="130" y="310" font-family="Consolas, monospace" font-size="31" fill="#1f2933">"http://127.0.0.1:8001/api/rooms/" + object.userData.room</text>
  <line x1="130" y1="370" x2="1470" y2="370" stroke="#d6dee6" stroke-width="2"/>
  <text x="130" y="455" font-family="Segoe UI, Arial" font-size="36" fill="#102f45">Texto fijo + identidad de la sala actual</text>
  <text x="130" y="540" font-family="Consolas, monospace" font-size="30" fill="#64748b">Sala_A-102 → /api/rooms/A-102</text>
  <text x="130" y="600" font-family="Consolas, monospace" font-size="30" fill="#64748b">Sala_A-101 → /api/rooms/A-101</text>
</svg>
