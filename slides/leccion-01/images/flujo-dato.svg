<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f6f8fa"/>
  <text x="90" y="110" font-family="Segoe UI, Arial" font-size="48" font-weight="700" fill="#102f45">Camino del dato IoT en BIMROCKET</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f28c28"/>
    </marker>
  </defs>
  <g font-family="Segoe UI, Arial">
    <g transform="translate(80,320)">
      <rect width="255" height="180" rx="24" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
      <text x="30" y="65" font-size="32" font-weight="700" fill="#102f45">API REST</text>
      <text x="30" y="120" font-family="Consolas, monospace" font-size="22" fill="#64748b">/api/rooms/A-102</text>
    </g>
    <line x1="335" y1="410" x2="395" y2="410" stroke="#f28c28" stroke-width="8" marker-end="url(#arrow)"/>
    <g transform="translate(390,320)">
      <rect width="255" height="180" rx="24" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
      <text x="30" y="65" font-size="32" font-weight="700" fill="#102f45">ctr_0</text>
      <text x="30" y="120" font-family="Consolas, monospace" font-size="22" fill="#64748b">RestPollController</text>
    </g>
    <line x1="645" y1="410" x2="705" y2="410" stroke="#f28c28" stroke-width="8" marker-end="url(#arrow)"/>
    <g transform="translate(700,320)">
      <rect width="255" height="180" rx="24" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
      <text x="30" y="65" font-size="32" font-weight="700" fill="#102f45">jsonOutput</text>
      <text x="30" y="120" font-family="Consolas, monospace" font-size="22" fill="#64748b">co2, room, status</text>
    </g>
    <line x1="955" y1="410" x2="1015" y2="410" stroke="#f28c28" stroke-width="8" marker-end="url(#arrow)"/>
    <g transform="translate(1010,320)">
      <rect width="255" height="180" rx="24" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
      <text x="30" y="65" font-size="32" font-weight="700" fill="#102f45">Fórmulas</text>
      <text x="30" y="120" font-family="Consolas, monospace" font-size="22" fill="#64748b">input + iotMatch</text>
    </g>
    <line x1="1265" y1="410" x2="1325" y2="410" stroke="#f28c28" stroke-width="8" marker-end="url(#arrow)"/>
    <g transform="translate(1320,320)">
      <rect width="220" height="180" rx="24" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
      <text x="30" y="65" font-size="32" font-weight="700" fill="#102f45">Salida</text>
      <text x="30" y="120" font-family="Consolas, monospace" font-size="22" fill="#64748b">panel + color</text>
    </g>
  </g>
  <text x="90" y="720" font-family="Segoe UI, Arial" font-size="34" fill="#1f2933">La geometría se convierte en un objeto con identidad, datos vivos y reglas de confianza.</text>
</svg>
