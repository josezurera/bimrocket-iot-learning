site_name: BIMROCKET IoT Learning
site_description: Curso práctico sobre BIMROCKET, IoT y edificios conectados
site_author: José Zurera
repo_url: https://github.com/josezurera/bimrocket-iot-learning
repo_name: josezurera/bimrocket-iot-learning
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search:
      lang: es
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Itinerario: roadmap.md
  - Fundamentos:
      - "Lección 1: del sensor al modelo": 01-fundamentos/01-del-sensor-al-modelo.md
  - BIMROCKET:
      - Arquitectura IoT: 02-bimrocket/arquitectura-iot.md
  - Laboratorios:
      - Índice: 03-laboratorios/index.md
      - "Laboratorio 1: sensor REST simulado": 03-laboratorios/01-sensor-rest-simulado.md
  - Código fuente:
      - Mapa de clases: 04-codigo-fuente/mapa-de-clases.md
  - Integración real:
      - Índice: 05-integracion-real/index.md
  - Glosario: glossary.md
  - Progreso:
      - "2026-06-24 — Lección 1": progreso/2026-06-24-leccion-1.md
  - Preguntas: questions.md
  - Plantilla de lección: plantillas/leccion.md
